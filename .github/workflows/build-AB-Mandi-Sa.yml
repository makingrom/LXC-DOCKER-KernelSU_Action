name: 高端机 阿菌未霜clang18
on:
  workflow_dispatch:

jobs:
  build:
    name: 
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    
    steps:
    - uses: actions/checkout@v5
    
    - name: 环境变量配置
      run: |
        cat config.env | grep KERNEL_SOURCE= >> $GITHUB_ENV
        cat config.env | grep KERNEL_SOURCE_BRANCH= >> $GITHUB_ENV
        cat config.env | grep KERNEL_CONFIG= >> $GITHUB_ENV
        cat config.env | grep KERNEL_ZIP_NAME= >> $GITHUB_ENV
        cat config.env | grep LLVM_CONFIG= >> $GITHUB_ENV
        cat config.env | grep KERNEL_IMAGE_NAME= >> $GITHUB_ENV
        cat config.env | grep NEED_DTBO= >> $GITHUB_ENV
        cat config.env | grep SWITCH_PYTHON= >> $GITHUB_ENV
        cat config.env | grep ENABLE_KVM= >> $GITHUB_ENV
        cat config.env | grep ENABLE_LXC_DOCKER= >> $GITHUB_ENV
        cat config.env | grep ENABLE_KERNELSU= >> $GITHUB_ENV
        cat config.env | grep KERNELSU_TAG= >> $GITHUB_ENV

    - name: 构建编译内核环境
      run: |
        sudo apt-get update
        sudo -E apt-get -y -qq install git make bc bison ccache openssl zip kmod cpio flex libelf-dev curl libssl-dev libtfm-dev wget device-tree-compiler ca-certificates python3 binutils binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: 缓存内核源码与工具链
      uses: actions/cache@v3
      with:
        path: |
          ${{ github.workspace }}/kernel_workspace
          ${{ github.workspace }}/clang-mandi-sa
          ${{ github.workspace }}/kernel_workspace/python2.7
          /tmp/Python-2.7.18
          /tmp/Python-2.7.18.tgz
        key: ${{ runner.os }}-kernel-clang-r416183b-${{ hashFiles('config.env') }}
        restore-keys: |
          ${{ runner.os }}-kernel-
          
    - name: 编译并切换 Python 2.7
      if: env.SWITCH_PYTHON == 'true'
      run: |
        PYTHON_DIR="${{ github.workspace }}/kernel_workspace/python2.7"
        PYTHON_BIN="${PYTHON_DIR}/bin/python2.7"

        # 2. 核心判断：只有Python不存在时，才执行编译（最外层判断）
        if [ ! -f "${PYTHON_BIN}" ]; then
          echo "⚠️ 工作目录Python 2.7未找到，开始编译安装..."
          
          sudo apt-get update -y
          sudo apt-get install -y build-essential checkinstall libreadline-dev libncursesw5-dev libssl-dev libsqlite3-dev tk-dev libgdbm-dev libc6-dev libbz2-dev libffi-dev zlib1g-dev

          if [ ! -f "/tmp/Python-2.7.18.tgz" ]; then
            echo "📥 Python源码包未缓存，开始下载..."
            cd /tmp && wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          else
            echo "✅ 使用缓存的Python源码包，跳过下载..."
            cd /tmp
          fi
          
          [ ! -d "/tmp/Python-2.7.18" ] && tar xzf Python-2.7.18.tgz

          cd /tmp/Python-2.7.18
          ./configure --enable-optimizations --prefix="${PYTHON_DIR}" > /dev/null 2>&1
          make -j$(nproc) > /dev/null 2>&1  # 屏蔽编译日志，节省输出时间
          make install > /dev/null 2>&1
        else
          echo "✅ 工作目录Python 2.7已存在（缓存恢复），跳过编译！"
        fi

        export PATH="${PYTHON_DIR}/bin:$PATH"
        ln -sf "${PYTHON_BIN}" "${PYTHON_DIR}/bin/python2"  # -sf强制覆盖，避免软链接重复

        echo "🔍 Python版本验证："
        "${PYTHON_BIN}" --version
        python --version
        python2.7 --version
        python2 --version

    - name: 下载 LLVM Clang工具链 (64位)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace

        if [ ! -d "clang-mandi-sa" ]; then
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-mandi-sa
        else
          echo "✅ clang-mandi-sa 目录已存在（缓存恢复），跳过克隆！"
        fi
       
        echo "🔍 验证 Clang..."
        $GITHUB_WORKSPACE/kernel_workspace/clang-mandi-sa/bin/clang --version
        
    - name: 下载内核源码
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace

        if [ ! -d "android-kernel" ]; then
          echo "📥 内核源码目录不存在，开始克隆..."
          git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel
        else
          echo "✅ android-kernel 目录已存在（缓存恢复），跳过克隆！"
          cd android-kernel && git pull
          cd ..
        fi
    
    - name: 开启lxc和docker配置
      if: env.ENABLE_LXC_DOCKER == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        CONFIG_FILE=$(find . -name "${{ env.KERNEL_CONFIG }}" | head -1)

        echo "找到配置文件：$CONFIG_FILE"

        echo ">>> 正在注入完整 LXC/Docker 配置..."
        sed -i 's/CONFIG_ANDROID_PARANOID_NETWORK=y/# CONFIG_ANDROID_PARANOID_NETWORK is not set/g' $CONFIG_FILE
        
        cat >> $CONFIG_FILE <<EOF
        CONFIG_NAMESPACES=y
        CONFIG_UTS_NS=y
        CONFIG_IPC_NS=y
        CONFIG_PID_NS=y
        CONFIG_NET_NS=y
        CONFIG_CGROUPS=y
        CONFIG_CGROUP_CPUACCT=y
        CONFIG_CGROUP_DEVICE=y
        CONFIG_CGROUP_FREEZER=y
        CONFIG_CGROUP_SCHED=y
        CONFIG_CPUSETS=y
        CONFIG_MEMCG=y
        CONFIG_KEYS=y
        CONFIG_VETH=y
        CONFIG_MACVLAN=y
        CONFIG_IPVLAN=y
        CONFIG_BRIDGE=y
        CONFIG_NETFILTER_XT_MATCH_COMMENT=y
        CONFIG_CGROUP_BPF=y
        CONFIG_BLK_CGROUP=y
        CONFIG_DEBUG_BLK_CGROUP=y
        CONFIG_CGROUP_WRITEBACK=y
        CONFIG_SOCK_CGROUP_DATA=y
        CONFIG_NET_CLS_CGROUP=y
        CONFIG_BLK_DEV_THROTTLING=y
        CONFIG_BLK_DEV_THROTTLING_LOW=y
        CONFIG_CGROUP_NET_CLASSID=y
        CONFIG_NETFILTER_XT_MATCH_CGROUP=y
        CONFIG_NETFILTER_XT_MATCH_OWNER=y
        CONFIG_NETFILTER=y
        CONFIG_NETFILTER_ADVANCED=y
        CONFIG_NF_CONNTRACK=y
        CONFIG_NF_LOG_COMMON=y
        CONFIG_NF_LOG_IPV4=y
        CONFIG_NF_LOG_IPV6=y
        CONFIG_NF_LOG_SYSLOG=y
        CONFIG_NF_DEFRAG_IPV4=y
        CONFIG_NF_REJECT_IPV4=y
        CONFIG_NF_NAT=y
        CONFIG_NF_NAT_IPV4=y
        CONFIG_NF_NAT_MASQUERADE_IPV4=y
        CONFIG_NF_NAT_REDIRECT_IPV4=y
        CONFIG_IP_NF_IPTABLES=y
        CONFIG_IP_NF_FILTER=y
        CONFIG_IP_NF_TARGET_REJECT=y
        CONFIG_IP_NF_MANGLE=y
        CONFIG_IP_NF_RAW=y
        CONFIG_IP_NF_SECURITY=y
        CONFIG_IP_NF_NAT=y
        CONFIG_IP_NF_TARGET_MASQUERADE=y
        CONFIG_IP_NF_TARGET_NETMAP=y
        CONFIG_IP_NF_TARGET_REDIRECT=y
        CONFIG_NF_TABLES=y
        CONFIG_NF_TABLES_INET=y
        CONFIG_NF_TABLES_NETDEV=y
        CONFIG_NFT_CT=y
        CONFIG_NFT_COUNTER=y
        CONFIG_NFT_CONNLIMIT=y
        CONFIG_NFT_HASH=y
        CONFIG_NFT_LIMIT=y
        CONFIG_NFT_LOG=y
        CONFIG_NFT_MASQ=y
        CONFIG_NFT_NAT=y
        CONFIG_NFT_REDIR=y
        CONFIG_NFT_REJECT=y
        CONFIG_NFT_COMPAT=y
        CONFIG_NFT_OBJREF=y
        CONFIG_NFT_QUEUE=y
        CONFIG_NFT_QUOTA=y
        CONFIG_NFT_SECMARK=y
        CONFIG_NFT_SOCKET=y
        CONFIG_NFT_TPROXY=y
        CONFIG_NFT_TUNNEL=y
        CONFIG_NETFILTER_XT_TARGET_CHECKSUM=y
        CONFIG_NETFILTER_XT_TARGET_CLASSIFY=y
        CONFIG_NETFILTER_XT_TARGET_CONNMARK=y
        CONFIG_NETFILTER_XT_TARGET_DSCP=y
        CONFIG_NETFILTER_XT_TARGET_HL=y
        CONFIG_NETFILTER_XT_TARGET_IDLETIMER=y
        CONFIG_NETFILTER_XT_TARGET_LED=y
        CONFIG_NETFILTER_XT_TARGET_LOG=y
        CONFIG_NETFILTER_XT_TARGET_MARK=y
        CONFIG_NETFILTER_XT_TARGET_NFLOG=y
        CONFIG_NETFILTER_XT_TARGET_NFQUEUE=y
        CONFIG_NETFILTER_XT_TARGET_NOTRACK=y
        CONFIG_NETFILTER_XT_TARGET_RATEEST=y
        CONFIG_NETFILTER_XT_TARGET_TEE=y
        CONFIG_NETFILTER_XT_TARGET_TPROXY=y
        CONFIG_NETFILTER_XT_TARGET_TRACE=y
        CONFIG_NETFILTER_XT_TARGET_SECMARK=y
        CONFIG_NETFILTER_XT_TARGET_TCPMSS=y
        CONFIG_NETFILTER_XT_TARGET_TCPOPTSTRIP=y
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_NETFILTER_XT_MATCH_CLUSTER=y
        CONFIG_NETFILTER_XT_MATCH_CONNBYTES=y
        CONFIG_NETFILTER_XT_MATCH_CONNLIMIT=y
        CONFIG_NETFILTER_XT_MATCH_CONNMARK=y
        CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
        CONFIG_NETFILTER_XT_MATCH_DCCP=y
        CONFIG_NETFILTER_XT_MATCH_DSCP=y
        CONFIG_NETFILTER_XT_MATCH_ECN=y
        CONFIG_NETFILTER_XT_MATCH_ESP=y
        CONFIG_NETFILTER_XT_MATCH_HASHLIMIT=y
        CONFIG_NETFILTER_XT_MATCH_HELPER=y
        CONFIG_NETFILTER_XT_MATCH_HL=y
        CONFIG_NETFILTER_XT_MATCH_IPRANGE=y
        CONFIG_NETFILTER_XT_MATCH_LENGTH=y
        CONFIG_NETFILTER_XT_MATCH_LIMIT=y
        CONFIG_NETFILTER_XT_MATCH_MAC=y
        CONFIG_NETFILTER_XT_MATCH_MARK=y
        CONFIG_NETFILTER_XT_MATCH_MULTIPORT=y
        CONFIG_NETFILTER_XT_MATCH_POLICY=y
        CONFIG_NETFILTER_XT_MATCH_PKTTYPE=y
        CONFIG_NETFILTER_XT_MATCH_QUOTA=y
        CONFIG_NETFILTER_XT_MATCH_RATEEST=y
        CONFIG_NETFILTER_XT_MATCH_REALM=y
        CONFIG_NETFILTER_XT_MATCH_SCTP=y
        CONFIG_NETFILTER_XT_MATCH_STATE=y
        CONFIG_NETFILTER_XT_MATCH_STATISTIC=y
        CONFIG_NETFILTER_XT_MATCH_STRING=y
        CONFIG_NETFILTER_XT_MATCH_TCPMSS=y
        CONFIG_NETFILTER_XT_MATCH_TIME=y
        CONFIG_NETFILTER_XT_MATCH_U32=y
        EOF
        
        echo ">>> 配置注入完成！"
    - name: 添加runc补丁
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

        CGROUP_FILE=$(find . -path "*/kernel/cgroup.c" -o -path "*/kernel/cgroup/cgroup.c" | head -1)

        if [ -z "$CGROUP_FILE" ]; then
          echo "⚠️ 找不到cgroup.c，跳过补丁"
          exit 0
        fi

        echo "✅ 找到文件: $CGROUP_FILE"
        sed -i 's/struct cred *get_task_cred(struct task_struct *p)/struct cred *get_task_cred(struct task_struct *p)\n{\n\treturn __task_cred(p);\n}\n\nstatic __always_inline struct cred *old_get_task_cred/g' "$CGROUP_FILE" 2>/dev/null
        echo ">>> runc 补丁完成！"
    
    - name: 修复clang18部分
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        CONFIG_FILE=$(find . -name "${{ env.KERNEL_CONFIG }}" | head -1)
        
        sed -i "s/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/g" "$CONFIG_FILE" 2>/dev/null

        echo ">>> Clang 18 修复中..."
        find . -name "Makefile" -o -name "*.h" | xargs sed -i 's/__attribute__((optimize("no-stack-protector")))//g' 2>/dev/null
        echo "CFLAGS=-Wno-error=unused-variable -Wno-error=unused-but-set-variable" >> $GITHUB_ENV
        echo "CXXFLAGS=-Wno-error=unused-variable -Wno-error=unused-but-set-variable" >> $GITHUB_ENV
        echo ">>> Clang 修复完成！"

    - name: 配置 ksu
      if: env.ENABLE_KERNELSU == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s ${{ env.KERNELSU_TAG }}

    - name: 开启kvm
      if: env.ENABLE_KVM == 'true'
      run: |
         cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
         CONFIG=$(find . -name "${{ env.KERNEL_CONFIG }}" | head -1)
         echo "CONFIG_VIRTUALIZATION=y" >> $CONFIG
         echo "CONFIG_KVM=y" >> $CONFIG
         echo "CONFIG_VHOST_NET=y" >> $CONFIG
         echo "CONFIG_VHOST_CROSS_ENDIAN_LEGACY=y" >> $CONFIG
         
    - name: 设置ccache缓存
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-mido-kernel
        max-size: 2G

    - name: 安装编译依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential gcc g++ make binutils libc6-dev flex bison libssl-dev bc cpio libtinfo-dev
        # 检查是否需要 libtinfo5
        if [ ! -f /usr/lib/x86_64-linux-gnu/libtinfo.so.5 ]; then
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
        fi
    - name: 开始编译内核
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        cp arch/arm64/configs/vendor/ZS673KS_defconfig arch/arm64/configs/
        echo "🔍 正在搜索 ZS673KS_defconfig..."
        FOUND_FILE=$(find . -name "ZS673KS_defconfig")

        if [ -z "$FOUND_FILE" ]; then
            echo "❌ 错误：找不到 ZS673KS_defconfig！请检查源码是否正确下载。"
          exit 1
        else
          echo "✅ 找到文件：$FOUND_FILE"
        fi
        
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-mandi-sa/bin:$PATH
        export KBUILD_BUILD_HOST=17
        export KBUILD_BUILD_USER=HyperPower
        
        file $GITHUB_WORKSPACE/kernel_workspace/clang-mandi-sa/bin/clang
        export HOSTARCH=x86_64
        
        make -s -j$(nproc --all) O=out ARCH=arm64 ${{ env.KERNEL_CONFIG }}
        
        if [ "${{env.LLVM_CONFIG}}" = "y" ]; then
          make -j$(nproc --all) CONFIG_DEBUG_SECTION_MISMATCH=y CC="ccache clang" CXX=clang++ O=out ARCH=arm64 CLANG_TRIPLE="aarch64-linux-gnu-" CROSS_COMPILE="aarch64-linux-gnu-" CROSS_COMPILE_ARM32="arm-linux-gnueabi-" LLVM=1 LLVM_IAS=1 KCFLAGS="-Wno-error" KBUILD_CFLAGS="-Wno-error"
        else
          make -j$(nproc --all) CONFIG_DEBUG_SECTION_MISMATCH=y CC="ccache clang" CXX=clang++ O=out ARCH=arm64 CLANG_TRIPLE="aarch64-linux-gnu-" CROSS_COMPILE="aarch64-linux-gnu-" CROSS_COMPILE_ARM32="arm-linux-gnueabi-" KCFLAGS="-Wno-error" KBUILD_CFLAGS="-Wno-error"
        fi
        
    - name: 准备打包内核
      run: |       
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!block=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/is_slot_device=1;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh        
        cp android-kernel/out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/
        if [ ${{ env.NEED_DTBO }} = true ]; then
            echo "NEED=true" >> $GITHUB_ENV
            if [ -f android-kernel/out/arch/arm64/boot/dtbo.img ]; then
                echo "DTBO_EXIST=true" >> $GITHUB_ENV           
            fi
        fi        
        if [ ${{ env.DTBO_EXIST }} = true ]; then
            cp android-kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/
        fi  
        rm -rf AnyKernel3/.git* AnyKernel3/README.md
        rm -rf AnyKernel3/ramdisk AnyKernel3/modules AnyKernel3/patch
        
    - name: 上传内核
      uses: actions/upload-artifact@v5
      with:
        name: ${{ env.KERNEL_ZIP_NAME }}
        path: kernel_workspace/AnyKernel3/*

    - name: 上传dtbo镜像
      if: env.DTBO_EXSIT == 'true' && env.NEED == 'true'
      uses: actions/upload-artifact@v5
      with:
        name: dtbo-image
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/dtbo.img
        
    - name: 强制保存缓存
      if: always()  # 关键：无论前面步骤成功/失败，都执行
      uses: actions/cache/save@v3
      with:
        path: |
          ${{ github.workspace }}/kernel_workspace
          ${{ github.workspace }}/clang-mandi-sa
          /usr/local/bin/python2.7
          /usr/local/include/python2.7
          /usr/local/lib/python2.7
        key: ${{ runner.os }}-kernel-clang-r416183b-${{ hashFiles('config.env') }}
